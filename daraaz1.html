<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopNow - Modern Ecommerce</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<style>
    :root{
  --primary:#f85606;
  --dark:#1f1f1f;
  --text:#555;
  --bg:#f6f7fb;
  --card:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:var(--bg);
  color:var(--dark);
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 5%;
  background:rgba(248,86,6,0.95);
  backdrop-filter:blur(10px);
  color:white;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.logo span{
  color:#111;
  background:#fff;
  padding:2px 6px;
  border-radius:4px;
}

.search-bar{
  display:flex;
  width:45%;
}

.search-bar input{
  flex:1;
  padding:10px 12px;
  border:none;
  outline:none;
  border-radius:6px 0 0 6px;
}

.search-bar button{
  padding:10px 18px;
  border:none;
  background:#222;
  color:white;
  cursor:pointer;
  border-radius:0 6px 6px 0;
  transition:0.3s;
}

.search-bar button:hover{
  background:#000;
}

.nav-links a{
  color:white;
  margin-left:15px;
  text-decoration:none;
  font-weight:500;
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;

  padding:70px 5%;
  align-items:center;

  background:linear-gradient(135deg,#fff,#ffe7d6);
}

.badge{
  display:inline-block;
  background:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  margin-bottom:15px;
}

.hero-text h1{
  font-size:52px;
  line-height:1.1;
  margin-bottom:15px;
}

.hero-text p{
  color:var(--text);
  font-size:18px;
  margin-bottom:25px;
}

.hero-actions{
  display:flex;
  gap:12px;
}

.btn{
  padding:12px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

.btn.primary{
  background:var(--primary);
  color:white;
}

.btn.primary:hover{
  background:#d94800;
}

.btn.secondary{
  background:white;
  border:1px solid #ddd;
}

.hero-img img{
  width:100%;
  max-width:450px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* CATEGORIES */
.categories{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:18px;

  padding:40px 5%;
}

.cat{
  background:var(--card);
  padding:18px;
  border-radius:14px;
  text-align:center;

  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  cursor:pointer;

  transition:0.3s ease;
  font-weight:500;
}

.cat:hover{
  transform:translateY(-6px);
  background:var(--primary);
  color:white;
}

/* RESPONSIVE */
@media (max-width:900px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }

  .search-bar{
    display:none;
  }

  .hero-actions{
    justify-content:center;
  }
}
</style>

<body>

<header class="navbar">
  <div class="logo">Shop<span>Now</span></div>

  <div class="search-bar">
    <input type="text" placeholder="Search products, brands...">
    <button>Search</button>
  </div>

  <div class="nav-links">
    <a href="#">Login</a>
    <a href="#">Cart 🛒</a>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <span class="badge">🔥 Mega Sale 2026</span>

    <h1>Shop Smarter.<br>Save Bigger.</h1>

    <p>Up to 70% off on Electronics, Fashion & Home Essentials. Limited time deals available now.</p>

    <div class="hero-actions">
      <button class="btn primary">Shop Now</button>
      <button class="btn secondary">Explore Deals</button>
    </div>
  </div>

  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f" alt="shopping">
  </div>
</section>

<section class="categories">
  <div class="cat">📱 Mobiles</div>
  <div class="cat">💻 Laptops</div>
  <div class="cat">👕 Fashion</div>
  <div class="cat">🏠 Home</div>
  <div class="cat">🎧 Accessories</div>
</section>

</body>
</html>
